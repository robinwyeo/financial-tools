name: Daily Stock Metrics Check

on:
  schedule:
    # 6:30 AM UTC daily (after US market close + data refresh)
    - cron: "30 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily check
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python jobs/daily_check.py

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/universe_snapshot.parquet || true
          git diff --staged --quiet || git commit -m "chore: refresh universe snapshot [skip ci]"
          git push || true
