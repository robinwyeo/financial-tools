name: Weekly Watchlist Scorecard

on:
  schedule:
    # Mondays 14:00 UTC ≈ 7:00 AM Pacific (adjust if your timezone differs)
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watchlist-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate SMTP secrets
        env:
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          missing=0
          for var in SMTP_FROM SMTP_TO SMTP_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error title=Missing secret::${var} is not set in repo Settings → Secrets → Actions"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "SMTP secrets present (from=${SMTP_FROM}, to=${SMTP_TO})"

      - name: Run weekly watchlist scorecard
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python jobs/daily_check.py
