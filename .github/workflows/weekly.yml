name: Monthly S&P 500 Scorecard

on:
  schedule:
    # 1st of each month, 14:00 UTC ≈ 7:00 AM Pacific
    - cron: "0 14 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  universe-check:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate SMTP secrets
        env:
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          missing=0
          for var in SMTP_FROM SMTP_TO SMTP_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error title=Missing secret::${var} is not set in repo Settings → Secrets → Actions"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "SMTP secrets present (from=${SMTP_FROM}, to=${SMTP_TO})"

      - name: Run monthly S&P 500 scorecard
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python jobs/weekly_check.py

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/universe_snapshot.parquet || true
          git diff --staged --quiet || git commit -m "chore: refresh universe snapshot (monthly) [skip ci]"
          git push || true
